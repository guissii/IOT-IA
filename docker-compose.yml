version: '3.8'

services:

  # ── BROKER MQTT ─────────────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.8.0
    container_name: emqx_broker
    environment:
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=adminensaf1
      - EMQX_ALLOW_ANONYMOUS=true
      # Auth intégrée : CLIENT1 / CLIENT123
      - EMQX_AUTH__MNESIA__AS=username
    ports:
      - "1883:1883"    # MQTT TCP
      - "8883:8883"    # MQTT SSL
      - "8083:8083"    # WebSocket (utilisé par le dashboard HTML)
      - "8084:8084"    # WebSocket Sécurisé (WSS)
      - "18083:18083"  # Interface web EMQX
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── SERVEUR IA PYTHON ────────────────────────────────────────────────────────
  ai_server:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: ai_server
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ── NODE-RED ─────────────────────────────────────────────────────────────────
  nodered:
    build:
      context: .
      dockerfile: Dockerfile.nodered
    container_name: mynodered
    environment:
      - TZ=Europe/Paris
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      emqx:
        condition: service_healthy



  # ── DASHBOARD WEB ────────────────────────────────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: smart_home_dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  nodered_data:
